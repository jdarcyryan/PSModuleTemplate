name: Publish to PowerShell Gallery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-psgallery:
    runs-on: windows-latest
    
    env:
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Profile
        shell: pwsh
        run: .\.build\scripts\Setup-RunnerProfile.ps1 -Verbose

      - name: Setup Container (Custom)
        shell: pwsh
        run: .\.build\custom\Setup-Container.ps1

      - name: Validate API Key
        shell: pwsh
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            Write-Host "ERROR: PSGALLERY_API_KEY secret is not configured." -ForegroundColor Red
            Write-Host "Please add the PowerShell Gallery API key as a repository secret named 'PSGALLERY_API_KEY'." -ForegroundColor Yellow
            Write-Host "You can generate an API key at: https://www.powershellgallery.com/account/apikeys" -ForegroundColor Yellow
            exit 1
          }
          Write-Host "PowerShell Gallery API key is configured." -ForegroundColor Green

      - name: Publish to PowerShell Gallery
        shell: pwsh
        run: .\.build\scripts\Publish-PSGalleryModule.ps1 -Verbose
