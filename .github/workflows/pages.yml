name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [visibility_changed]

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Guard: check repo visibility ────────────────────────────────
  check-visibility:
    runs-on: ubuntu-latest
    outputs:
      is_private: ${{ steps.check.outputs.is_private }}
    steps:
      - name: Check repo visibility
        id: check
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ]; then
            echo "is_private=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Repository is private — Pages deployment will be skipped"
          else
            echo "is_private=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Teardown: remove Pages if repo is private ───────────────────
  teardown:
    runs-on: ubuntu-latest
    needs: check-visibility
    if: needs.check-visibility.outputs.is_private == 'true'
    steps:
      - name: Remove GitHub Pages deployments
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "Repository is private — removing existing Pages deployments"
          DEPLOYMENTS=$(gh api "repos/${REPO}/deployments?environment=github-pages&per_page=100" --jq '.[].id' 2>/dev/null || true)
          if [ -z "$DEPLOYMENTS" ]; then
            echo "No existing Pages deployments found"
            exit 0
          fi
          for ID in $DEPLOYMENTS; do
            echo "Deactivating deployment ${ID}..."
            gh api --method POST -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/deployments/${ID}/statuses" -f state=inactive 2>/dev/null || true
            echo "Deleting deployment ${ID}..."
            gh api --method DELETE -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/deployments/${ID}" 2>/dev/null || true
          done
          echo "All Pages deployments removed"

  # ── Build (only if public) ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: check-visibility
    if: needs.check-visibility.outputs.is_private == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Jekyll site
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}
          REPO_DESC: ${{ github.event.repository.description }}
        run: |
          set -e

          OWNER="${REPO_FULL%%/*}"
          REPO="${REPO_NAME}"
          DESC="${REPO_DESC:-$REPO}"
          BASE_URL="/${REPO}"
          STAGE="_site_source"

          echo "::group::Staging allowed files"
          mkdir -p "${STAGE}"

          find . -name '*.md' \
            -not -path './.git/*' \
            -not -path "./${STAGE}/*" \
            | while read -r f; do
                dest="${STAGE}/${f#./}"
                mkdir -p "$(dirname "$dest")"
                cp "$f" "$dest"
              done

          for lf in LICENSE LICENSE.txt; do
            [ -f "$lf" ] && cp "$lf" "${STAGE}/"
          done

          find "${STAGE}" -name '.gitkeep' -delete

          echo "Staged files:"
          find "${STAGE}" -type f | sort
          echo "::endgroup::"

          cd "${STAGE}"

          echo "::group::Generating Jekyll config and layout"

          # ── _config.yml ───────────────────────────────────────────────
          cat > _config.yml << CONFIGEOF
          title: "${REPO}"
          description: "${DESC}"
          permalink: pretty
          baseurl: "${BASE_URL}"
          github_repo: "https://github.com/${REPO_FULL}"

          defaults:
            - scope:
                path: "docs"
              values:
                layout: default
                nav_section: docs
          CONFIGEOF

          # ── _layouts/default.html ─────────────────────────────────────
          mkdir -p _layouts
          cat > _layouts/default.html << 'LAYOUTEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{{ page.title | default: site.title }}</title>
            <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/PowerShell/PowerShell/refs/heads/master/assets/ps_black_128.svg">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
            <style>
              :root{
                --bg-page:#f6f8fa;--bg-content:#fff;--bg-header:#fff;--bg-code:#f6f8fa;
                --text-primary:#24292f;--text-secondary:#57606a;--text-muted:#8b949e;
                --border:#d0d7de;--link:#0969da;--accent:#fd8c73;
                --badge-bg:#dafbe1;--badge-text:#1a7f37;
              }
              @media(prefers-color-scheme:dark){
                :root{
                  --bg-page:#0d1117;--bg-content:#161b22;--bg-header:#161b22;--bg-code:#1c2129;
                  --text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#6e7681;
                  --border:#30363d;--link:#58a6ff;--accent:#f78166;
                  --badge-bg:#1b3826;--badge-text:#3fb950;
                }
              }
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:'IBM Plex Sans',-apple-system,sans-serif;color:var(--text-primary);background:var(--bg-page);line-height:1.7}
              a{color:var(--link);text-decoration:none}
              a:hover{text-decoration:underline}
              .site-header{background:var(--bg-header);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
              .site-title{font-size:16px;font-weight:500;color:var(--text-primary);text-decoration:none}
              .site-nav{display:flex;gap:20px;flex-wrap:wrap}
              .site-nav a{font-size:14px;color:var(--text-secondary);text-decoration:none;padding:4px 0}
              .site-nav a:hover{color:var(--text-primary)}
              .site-nav a.active{color:var(--text-primary);font-weight:500;border-bottom:2px solid var(--accent)}
              .container{max-width:820px;margin:32px auto;padding:0 24px}
              .content{background:var(--bg-content);border:1px solid var(--border);border-radius:6px;padding:32px}
              .content h1{font-size:24px;font-weight:500;margin:0 0 16px;border-bottom:1px solid var(--border);padding-bottom:8px}
              .content h2{font-size:20px;font-weight:500;margin:24px 0 12px;border-bottom:1px solid var(--border);padding-bottom:6px}
              .content h3{font-size:16px;font-weight:500;margin:20px 0 8px}
              .content h4{font-size:14px;font-weight:500;margin:16px 0 6px}
              .content p{font-size:14px;color:var(--text-secondary);margin:0 0 16px}
              .content ul,.content ol{font-size:14px;color:var(--text-secondary);margin:0 0 16px;padding-left:24px}
              .content li{margin-bottom:4px}
              .content code{font-family:'IBM Plex Mono',monospace;font-size:13px;background:var(--bg-code);padding:2px 6px;border-radius:4px}
              .content pre{background:var(--bg-code);border:1px solid var(--border);border-radius:6px;padding:16px;overflow-x:auto;margin:8px 0 16px;line-height:1.5}
              .content pre code{background:transparent;padding:0}
              .content table{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:14px}
              .content th,.content td{border:1px solid var(--border);padding:8px 12px;text-align:left}
              .content th{background:var(--bg-code);font-weight:500}
              .content img{max-width:100%}
              .content strong{color:var(--text-primary)}
              .release{border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
              .release>summary{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;list-style:none}
              .release>summary::-webkit-details-marker{display:none}
              .release>summary::before{content:'';display:inline-block;width:0;height:0;border-left:5px solid var(--text-muted);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform 0.15s}
              .release[open]>summary::before{transform:rotate(90deg)}
              .release-tag{font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--link)}
              .release-date{font-size:13px;color:var(--text-muted)}
              .release-latest{font-size:11px;padding:2px 8px;border-radius:16px;background:var(--badge-bg);color:var(--badge-text);font-weight:500}
              .release-body{padding:0 16px 16px;font-size:14px;color:var(--text-secondary);line-height:1.7}
              .release-body h2,.release-body h3{font-size:14px;font-weight:500;color:var(--text-primary);margin:12px 0 4px;border:none;padding:0}
              .release-body ul{padding-left:20px}
              .release-body li{margin-bottom:2px;font-size:13px}
              .release-body pre{background:var(--bg-code);border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto;font-size:13px;line-height:1.5}
              .release-body code{font-family:'IBM Plex Mono',monospace;font-size:13px;background:var(--bg-code);padding:2px 4px;border-radius:3px}
              .release-body pre code{background:transparent;padding:0}
              .release-assets{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
              .release-assets>summary{padding:0;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-primary);list-style:none;display:flex;align-items:center;gap:6px}
              .release-assets>summary::-webkit-details-marker{display:none}
              .release-assets>summary::before{content:'';display:inline-block;width:0;height:0;border-left:4px solid var(--text-muted);border-top:3px solid transparent;border-bottom:3px solid transparent;transition:transform 0.15s}
              .release-assets[open]>summary::before{transform:rotate(90deg)}
              .release-asset{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-secondary);padding:3px 0;padding-left:10px}
              .loading{text-align:center;padding:32px;color:var(--text-muted);font-size:14px}
              .code-block-wrap{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:8px 0 16px}
              .code-block-wrap .lang-label{font-size:11px;color:var(--text-muted);padding:4px 12px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace}
              .code-block-wrap pre{margin:0;border:none;border-radius:0}
              pre[class*="language-"],code[class*="language-"]{font-family:'IBM Plex Mono',monospace;font-size:13px}
              pre[class*="language-"]{background:var(--bg-code);margin:0;padding:12px 16px}
              @media(prefers-color-scheme:dark){
                pre[class*="language-"],code[class*="language-"]{color:var(--text-primary)}
                .token.comment,.token.prolog,.token.doctype,.token.cdata{color:#8b949e}
                .token.punctuation{color:#8b949e}
                .token.property,.token.tag,.token.boolean,.token.number,.token.constant,.token.symbol,.token.deleted{color:#ff7b72}
                .token.selector,.token.attr-name,.token.string,.token.char,.token.builtin,.token.inserted{color:#a5d6ff}
                .token.operator,.token.entity,.token.url{color:#79c0ff}
                .token.atrule,.token.attr-value,.token.keyword{color:#d2a8ff}
                .token.function,.token.class-name{color:#d2a8ff}
                .token.regex,.token.important,.token.variable{color:#ffa657}
              }
              @media(max-width:640px){.site-header{padding:12px 16px}.container{padding:0 12px;margin:16px auto}.content{padding:20px}}
            </style>
          </head>
          <body>
            <header class="site-header">
              <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
              <nav class="site-nav">
                <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
                {% assign has_docs = false %}{% for p in site.pages %}{% if p.path contains 'docs/' and p.name != 'index.md' %}{% assign has_docs = true %}{% break %}{% endif %}{% endfor %}
                {% if has_docs %}<a href="{{ '/docs/' | relative_url }}" {% if page.url contains '/docs' %}class="active"{% endif %}>Docs</a>{% endif %}
                <a href="{{ '/releases/' | relative_url }}" {% if page.url contains '/releases' %}class="active"{% endif %}>Releases</a>
                {% for p in site.pages %}{% if p.path == 'LICENSE.md' %}<a href="{{ '/license/' | relative_url }}" {% if page.url contains '/license' %}class="active"{% endif %}>License</a>{% break %}{% endif %}{% endfor %}
                {% for p in site.pages %}{% if p.path == 'CONTRIBUTING.md' %}<a href="{{ '/contributing/' | relative_url }}" {% if page.url contains '/contributing' %}class="active"{% endif %}>Contributing</a>{% break %}{% endif %}{% endfor %}
                {% for p in site.pages %}{% if p.path == 'CODE_OF_CONDUCT.md' %}<a href="{{ '/code-of-conduct/' | relative_url }}" {% if page.url contains '/code-of-conduct' %}class="active"{% endif %}>Code of conduct</a>{% break %}{% endif %}{% endfor %}
                <a href="{{ site.github_repo }}" target="_blank" rel="noopener">View source</a>
              </nav>
            </header>
            <main class="container">
              <div class="content">{{ content }}</div>
            </main>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-powershell.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-docker.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
          </body>
          </html>
          LAYOUTEOF
          echo "::endgroup::"

          echo "::group::Processing content files"

          # ── README.md → homepage ──────────────────────────────────────
          if [ -f "README.md" ] && ! head -1 README.md | grep -q '^\-\-\-'; then
            TEMP=$(mktemp)
            printf -- '---\nlayout: default\ntitle: Home\npermalink: /\n---\n\n' > "$TEMP"
            cat README.md >> "$TEMP"
            mv "$TEMP" README.md
            echo "Processed README.md → homepage"
          fi

          # ── Fix relative links for Jekyll ─────────────────────────────
          for f in *.md; do
            [ -f "$f" ] || continue
            [ -f "CONTRIBUTING.md" ] && sed -i 's|\](CONTRIBUTING\.md)|\](contributing/)|g' "$f"
            [ -f "CODE_OF_CONDUCT.md" ] && sed -i 's|\](CODE_OF_CONDUCT\.md)|\](code-of-conduct/)|g' "$f"
            ([ -f "LICENSE" ] || [ -f "LICENSE.txt" ] || [ -f "LICENSE.md" ]) && sed -i 's|\](LICENSE)|\](license/)|g' "$f"
          done

          # ── Docs: add front matter + create index ─────────────────────
          if [ -d "docs" ]; then
            for f in docs/*.md; do
              [ -f "$f" ] || continue
              [ "$(basename "$f")" = "index.md" ] && continue

              if ! head -1 "$f" | grep -q '^\-\-\-'; then
                BASENAME=$(basename "$f" .md)
                SYNOPSIS=$(grep -m1 -A1 '## Synopsis' "$f" 2>/dev/null | tail -1 | sed 's/^[[:space:]]*//')
                [ -z "$SYNOPSIS" ] && SYNOPSIS="$BASENAME"
                TEMP=$(mktemp)
                printf -- '---\nlayout: default\ntitle: %s\ndescription: "%s"\n---\n\n' "$BASENAME" "$SYNOPSIS" > "$TEMP"
                cat "$f" >> "$TEMP"
                mv "$TEMP" "$f"
                echo "Processed $f"
              fi
            done

            if [ ! -f "docs/index.md" ]; then
              cat > docs/index.md << 'DOCSEOF'
          ---
          layout: default
          title: Docs
          permalink: /docs/
          ---
          # Function reference
          {% assign doc_pages = site.pages | where_exp: "p", "p.path contains 'docs/'" | where_exp: "p", "p.name != 'index.md'" | sort: "title" %}
          {% if doc_pages.size > 0 %}
          <ul>
          {% for doc in doc_pages %}
          <li><a href="{{ doc.url | relative_url }}"><code>{{ doc.title }}</code></a> — {{ doc.description | default: doc.title }}</li>
          {% endfor %}
          </ul>
          {% else %}
          <p><em>No function documentation found yet.</em></p>
          {% endif %}
          DOCSEOF
              echo "Created docs/index.md"
            fi
          fi

          # ── Releases page ─────────────────────────────────────────────
          mkdir -p _includes
          cat > _includes/releases.js << 'JSEOF'
          (async function() {
            var c = document.getElementById('releases-container');
            var repo = c.getAttribute('data-repo');
            var SHELL = {'bash':1,'sh':1,'shell':1,'console':1,'zsh':1,'terminal':1};
            try {
              var res = await fetch('https://api.github.com/repos/' + repo + '/releases');
              if (!res.ok) throw new Error(res.status);
              var data = await res.json();
              if (!data.length) { c.innerHTML = '<p>No releases found.</p>'; return; }

              function inline(s) {
                var codes = [];
                s = s.replace(/`([^`]+)`/g, function(m, code) {
                  codes.push(code.replace(/</g,'&lt;').replace(/>/g,'&gt;'));
                  return '\x00CODE' + (codes.length - 1) + '\x00';
                });
                s = s
                  .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
                  .replace(/(https?:\/\/[^\s<)]+)/g, function(m, url, offset, str) {
                    if (str.charAt(offset - 1) === '"' || str.charAt(offset - 1) === '>' || str.substring(offset - 6, offset) === 'href="') return m;
                    return '<a href="' + url + '">' + url + '</a>';
                  })
                  .replace(/(^|[\s(])@([a-zA-Z0-9_-]+)/g, function(m, pre, user) {
                    return pre + '<a href="https://github.com/' + user + '">@' + user + '</a>';
                  })
                  .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                  .replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');
                s = s.replace(/\x00CODE(\d+)\x00/g, function(m, idx) {
                  return '<code>' + codes[parseInt(idx)] + '</code>';
                });
                return s;
              }

              function md(s) {
                if (!s) return '';
                var lines = s.split('\n');
                var html = '';
                var inList = false;
                for (var i = 0; i < lines.length; i++) {
                  var line = lines[i];
                  var h3 = line.match(/^### (.+)$/);
                  var h2 = line.match(/^## (.+)$/);
                  var li = line.match(/^\* (.+)$/);
                  var cb = line.match(/^```(.*)$/);
                  if (cb) {
                    if (inList) { html += '</ul>'; inList = false; }
                    var lang = cb[1].trim();
                    var escaped = '';
                    i++;
                    while (i < lines.length && !lines[i].match(/^```/)) { escaped += lines[i] + '\n'; i++; }
                    escaped = escaped.replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    var isShell = !lang || SHELL[lang.toLowerCase()];
                    var langLabel = (!isShell && lang) ? '<div class="lang-label">' + lang + '</div>' : '';
                    var langClass = lang ? ' class="language-' + lang + '"' : '';
                    html += '<div class="code-block-wrap">' + langLabel + '<pre' + langClass + '><code' + langClass + '>' + escaped + '</code></pre></div>';
                  } else if (h2) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h2>' + inline(h2[1]) + '</h2>';
                  } else if (h3) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h3>' + inline(h3[1]) + '</h3>';
                  } else if (li) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    html += '<li>' + inline(li[1]) + '</li>';
                  } else {
                    if (inList) { html += '</ul>'; inList = false; }
                    if (line.trim() === '---') { html += '<hr>'; }
                    else if (line.trim()) {
                      html += '<p>' + inline(line) + '</p>';
                    }
                  }
                }
                if (inList) html += '</ul>';
                return html;
              }

              c.innerHTML = data.map(function(r, i) {
                var d = new Date(r.published_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                var latest = i === 0 ? '<span class="release-latest">latest</span>' : '';
                var openAttr = i === 0 ? ' open' : '';

                var sha = r.target_commitish || '';
                var shortSha = sha.substring(0, 7);
                var shaHtml = '';
                if (sha.length >= 7) {
                  shaHtml = '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:13px;color:var(--text-muted)">'
                    + '<a href="https://github.com/' + repo + '/commit/' + sha + '" style="font-family:IBM Plex Mono,monospace;font-size:12px">' + shortSha + '</a>'
                    + '</div>';
                }

                var assets = '';
                if (r.assets.length) {
                  var hashMap = {};
                  var mainAssets = [];
                  for (var j = 0; j < r.assets.length; j++) {
                    var a = r.assets[j];
                    if (a.name.match(/\.(sha256|sha512|md5|sha1)$/i)) {
                      var base = a.name.replace(/\.(sha256|sha512|md5|sha1)$/i, '');
                      hashMap[base] = a;
                    } else {
                      mainAssets.push(a);
                    }
                  }

                  var srcZip = 'https://github.com/' + repo + '/archive/refs/tags/' + r.tag_name + '.zip';
                  var srcTar = 'https://github.com/' + repo + '/archive/refs/tags/' + r.tag_name + '.tar.gz';
                  var totalAssets = mainAssets.length + 2;

                  assets = '<details class="release-assets" open><summary>Assets (' + totalAssets + ')</summary>';
                  for (var j = 0; j < mainAssets.length; j++) {
                    var a = mainAssets[j];
                    var hash = hashMap[a.name];
                    var hashHtml = '';
                    if (hash) {
                      hashHtml = ' <span style="font-size:11px;color:var(--text-muted)">(' + hash.name.split('.').pop() + ')</span>';
                    }
                    assets += '<div class="release-asset"><a href="' + a.browser_download_url + '">' + a.name + '</a> <span style="color:var(--text-muted)">' + (a.size / 1024).toFixed(1) + ' KB</span>' + hashHtml + '</div>';
                  }
                  assets += '<div class="release-asset"><a href="' + srcZip + '">Source code</a> <span style="color:var(--text-muted)">(zip)</span></div>';
                  assets += '<div class="release-asset"><a href="' + srcTar + '">Source code</a> <span style="color:var(--text-muted)">(tar.gz)</span></div>';
                  assets += '</details>';
                }

                return '<details class="release"' + openAttr + '><summary><span class="release-tag">' + r.tag_name + '</span>' + latest + '<span class="release-date">' + d + '</span></summary><div class="release-body">' + md(r.body) + assets + shaHtml + '</div></details>';
              }).join('');

              // Trigger Prism highlighting on dynamically inserted code
              if (typeof Prism !== 'undefined') Prism.highlightAll();
            } catch(e) {
              c.innerHTML = '<p>Unable to load releases. Visit <a href="https://github.com/' + repo + '/releases">GitHub</a> directly.</p>';
            }
          })();
          JSEOF

          cat > releases.md << RELEOF
          ---
          layout: default
          title: Releases
          permalink: /releases/
          ---
          # Releases
          <div id="releases-container" data-repo="${REPO_FULL}"><div class="loading">Loading releases...</div></div>
          <script>
          {% include releases.js %}
          </script>
          RELEOF
          echo "Created releases.md"

          # ── License page (full content from LICENSE/LICENSE.txt) ──────
          LICENSE_SRC=""
          for lf in LICENSE LICENSE.txt; do
            [ -f "$lf" ] && LICENSE_SRC="$lf" && break
          done

          if [ -n "$LICENSE_SRC" ]; then
            if ! ([ -f "LICENSE.md" ] && head -1 LICENSE.md | grep -q '^\-\-\-'); then
              TEMP=$(mktemp)
              printf -- '---\nlayout: default\ntitle: License\npermalink: /license/\n---\n\n# License\n\n```\n' > "$TEMP"
              cat "$LICENSE_SRC" >> "$TEMP"
              printf '\n```\n' >> "$TEMP"
              mv "$TEMP" LICENSE.md
              echo "Created LICENSE.md from ${LICENSE_SRC}"
            fi
          elif [ -f "LICENSE.md" ] && ! head -1 LICENSE.md | grep -q '^\-\-\-'; then
            TEMP=$(mktemp)
            printf -- '---\nlayout: default\ntitle: License\npermalink: /license/\n---\n\n' > "$TEMP"
            cat LICENSE.md >> "$TEMP"
            mv "$TEMP" LICENSE.md
            echo "Processed LICENSE.md"
          fi

          # ── CONTRIBUTING.md ───────────────────────────────────────────
          if [ -f "CONTRIBUTING.md" ] && ! head -1 CONTRIBUTING.md | grep -q '^\-\-\-'; then
            TEMP=$(mktemp)
            printf -- '---\nlayout: default\ntitle: Contributing\npermalink: /contributing/\n---\n\n' > "$TEMP"
            cat CONTRIBUTING.md >> "$TEMP"
            mv "$TEMP" CONTRIBUTING.md
            echo "Processed CONTRIBUTING.md"
          fi

          # ── CODE_OF_CONDUCT.md ────────────────────────────────────────
          if [ -f "CODE_OF_CONDUCT.md" ] && ! head -1 CODE_OF_CONDUCT.md | grep -q '^\-\-\-'; then
            TEMP=$(mktemp)
            printf -- '---\nlayout: default\ntitle: Code of Conduct\npermalink: /code-of-conduct/\n---\n\n' > "$TEMP"
            cat CODE_OF_CONDUCT.md >> "$TEMP"
            mv "$TEMP" CODE_OF_CONDUCT.md
            echo "Processed CODE_OF_CONDUCT.md"
          fi

          echo "::endgroup::"

          echo "Final site source contents:"
          find . -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./_site_source
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # ── Deploy (only if build succeeded) ────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
